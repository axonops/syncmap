version: 2

project_name: syncmap

builds:
  - skip: true

# No Go binaries are built (pure library), so the only release artefact
# is the source tarball emitted by the `source` stanza below. The
# `archives:` block is intentionally empty — it needs a build context,
# which we don't have, so it would produce nothing and break the
# `actions/attest-build-provenance` step that globs dist/*.tar.gz.
source:
  enabled: true
  name_template: "{{ .ProjectName }}-{{ .Version }}-source"
  format: tar.gz

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ .Tag }}-SNAPSHOT-{{ .ShortCommit }}"

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Documentation
      regexp: '^.*?docs(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: Performance
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 3
    - title: Refactors
      regexp: '^.*?refactor(\([[:word:]]+\))??!?:.+$'
      order: 4
    - title: Other
      order: 999
  filters:
    exclude:
      - '^test:'
      - '^chore:'
      - '^ci:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: axonops
    name: syncmap
  prerelease: auto
  draft: false
  mode: replace
  header: |
    ## syncmap {{ .Tag }}

    Type-safe generic wrapper around Go's `sync.Map`. Zero runtime dependencies.

    See [CHANGELOG.md](./CHANGELOG.md) for full release notes.
  footer: |
    ---

    **Full diff:** [{{ .PreviousTag }}...{{ .Tag }}](https://github.com/axonops/syncmap/compare/{{ .PreviousTag }}...{{ .Tag }})
